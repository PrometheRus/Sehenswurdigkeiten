---
- name: Filter traffic via iptables
  gather_facts: false
  hosts: all

  tasks:
    - name: Allow all 192.168.11.0/24 traffic
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        source: 192.168.11.0/24
        jump: ACCEPT
        action: insert

    - name: Allow all 192.168.12.0/24 traffic
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        source: 192.168.11.0/24
        jump: ACCEPT
        action: insert

    - name: Allow 188.93.16.0/22 subnet
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        source: 188.93.16.0/22
        jump: ACCEPT
        action: insert

    - name: Allow 185.97.200.0/22 subnet (home ISP)
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        source: 185.97.200.0/22
        jump: ACCEPT
        action: insert

    - name: Allow related and established connections
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
        action: insert

    - name: Prohibit everything else
      ansible.builtin.iptables:
        in_interface: eth0
        chain: INPUT
        reject_with: icmp-host-prohibited
        action: append