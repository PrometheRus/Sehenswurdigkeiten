[[local|localrc]]
# ===== BEGIN localrc =====
# 1st interface
HOST_IP=192.168.11.20
SERVICE_HOST=192.168.11.20

DATABASE_PASSWORD=password
ADMIN_PASSWORD=password
SERVICE_PASSWORD=password
SERVICE_TOKEN=password
RABBIT_PASSWORD=password

GIT_BASE=https://opendev.org

# sudo apt install -y openvswitch-switch
# sudo ovs-vsctl add-br br-vlan
# sudo ovs-vsctl add-port br-vlan eth1
# If you want to enable a provider network instead of the default private network after your DevStack environment installation
Q_AGENT=openvswitch
Q_USE_PROVIDER_NETWORKING=True
PHYSICAL_NETWORK=192.168.12.0/25
PROVIDER_NETWORK_TYPE=flat
PUBLIC_INTERFACE=eth1
OVS_PHYSICAL_BRIDGE=br-vlan
PROVIDER_SUBNET_NAME=manual-subnet

# use the following for IPv4
IP_VERSION=4
FIXED_RANGE=192.168.12.0/25
NETWORK_GATEWAY=192.168.12.1
ALLOCATION_POOL=start=192.168.12.250,end=192.168.12.270

# If you wish to use the provider network for public access to the cloud, set the following
#Q_USE_PROVIDERNET_FOR_PUBLIC=True
#PUBLIC_NETWORK_NAME=<Provider network name>
#PUBLIC_NETWORK_GATEWAY=<Provider network gateway>
#PUBLIC_PHYSICAL_NETWORK=<Provider network name>
#IP_VERSION=4
#PUBLIC_SUBNET_NAME=<provider subnet name>
#Q_FLOATING_ALLOCATION_POOL=<Provider Network Allocation Pool>
#FLOATING_RANGE=<CIDR for the Provider Network>


# Optional settings:
# OCTAVIA_AMP_BASE_OS=centos
# OCTAVIA_AMP_DISTRIBUTION_RELEASE_ID=9-stream
# OCTAVIA_AMP_IMAGE_SIZE=3
# OCTAVIA_LB_TOPOLOGY=ACTIVE_STANDBY
# OCTAVIA_ENABLE_AMPHORAV2_JOBBOARD=True
# LIBS_FROM_GIT+=octavia-lib,

# Enable Logging
LOGFILE=$DEST/logs/stack.sh.log
VERBOSE=True
LOG_COLOR=True
enable_service rabbit
enable_plugin neutron $GIT_BASE/openstack/neutron
# Octavia supports using QoS policies on the VIP port:
enable_service q-qos
enable_service placement-api placement-client
# Octavia services
enable_plugin octavia $GIT_BASE/openstack/octavia master
enable_plugin octavia-dashboard $GIT_BASE/openstack/octavia-dashboard
enable_plugin ovn-octavia-provider $GIT_BASE/openstack/ovn-octavia-provider
enable_plugin octavia-tempest-plugin $GIT_BASE/openstack/octavia-tempest-plugin
enable_service octavia o-api o-cw o-hm o-hk o-da
# If you are enabling barbican for TLS offload in Octavia, include it here.
# enable_plugin barbican $GIT_BASE/openstack/barbican
# enable_service barbican
# Cinder (optional)
disable_service c-api c-vol c-sch cinder
# Tempest
enable_service tempest
# ===== END localrc =====


# NOTE: DO NOT MOVE THESE SECTIONS FROM THE END OF THIS FILE
# IF YOU DO, THEY WON'T WORK!!!!!
#

# Enable Nova automatic host discovery for cell every 2 seconds
# Only needed in case of multinode devstack, as otherwise there will be issues
# when the 2nd compute node goes online.

# The next line is used to insert extra configuration here from the vagrant
# script, please don't modify or remove, keep it before any post-config items
#EXTRA_CONFIG

[[post-config|$NOVA_CONF]]
[scheduler]
discover_hosts_in_cells_interval = 2